<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculadora</title>
    <link
      rel="shortcut icon"
      href="../assets/favicon.png"
      type="image/x-icon"
    />
    <link rel="stylesheet" href="../dist/css/reset.css" />
    <link rel="stylesheet" href="../dist/css/basicCalculator.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <header class="header header--mobile">
      <nav class="navbar navbar--mobile">
        <h1 class="navbar__title--mobile">Caculadora</h1>
        <img
          src="../assets/more-vertical.svg"
          alt="menu"
          class="navbar__icon--mobile"
        />
      </nav>
    </header>
    <main class="main">
      <section class="calculator calculator--mobile">
        <div class="calculator__visor--mobile"></div>
        <div class="calculator__buttons--mobile">
          <button id="ac">AC</button>
          <button id="history">
            <img src="../assets/clock.svg" alt="Histórico" />
          </button>
          <button id="percent">
            <img src="../assets/percent.svg" alt="Porcentagem" />
          </button>
          <button id="divide">
            <img src="../assets/divide-circle.svg" alt="Divisão" />
          </button>
          <button value="7">7</button> <button value="8">8</button>
          <button value="9">9</button>
          <button><img src="../assets/x.svg" alt="Multiplicar" /></button>
          <button value="4">4</button> <button value="5">5</button>
          <button value="6">6</button>
          <button id="minus">
            <img src="../assets/minus.svg" alt="Subtração" />
          </button>
          <button value="1">1</button> <button value="2">2</button>
          <button value="3">3</button>
          <button id="plus"><img src="../assets/plus.svg" alt="Soma" /></button>
          <button value="0">0</button> <button value=",">,</button>
          <button id="delete">
            <img src="../assets/delete.svg" alt="Deletar" />
          </button>
          <button id="equal">
            <img src="../assets/equal.svg" alt="Igual a" />
          </button>
        </div>
      </section>
      <aside class="sidebar-desktop"></aside>
      <section class="calculator-desktop"></section>
    </main>
    <script src="https://unpkg.com/feather-icons"></script>
  </body>
</html>
